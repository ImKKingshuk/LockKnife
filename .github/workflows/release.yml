name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run maturin develop
      - run: uv run cargo test --workspace

  build-wheels:
    name: Build wheels — ${{ matrix.target }} (${{ matrix.os }})
    needs: [rust-tests]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            # ring fails in the older auto-selected ARM cross image; use an
            # explicit newer manylinux cross image/toolchain for release builds.
            manylinux: "2_28"
          # ── macOS ──────────────────────────────────────────
          - os: macos-latest      # Apple Silicon runner
            target: aarch64-apple-darwin
            manylinux: "off"
          # ── Windows ────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: -m lockknife-core/Cargo.toml --release --out dist

      - name: Smoke test built wheel
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import subprocess
          import sys
          import tempfile
          import zipfile

          wheels = sorted(Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel artifacts found in dist/")

          extracted_dirs: list[Path] = []
          for wheel in wheels:
              extract_dir = Path(tempfile.mkdtemp(prefix=f"{wheel.stem}-"))
              with zipfile.ZipFile(wheel) as archive:
                  archive.extractall(extract_dir)

              entry_points = next(extract_dir.glob("*.dist-info/entry_points.txt"), None)
              if entry_points is None:
                  raise SystemExit(f"{wheel.name} is missing entry_points.txt")

              entry_text = entry_points.read_text(encoding="utf-8")
              if "lockknife=lockknife_headless_cli.main:cli" not in entry_text:
                  raise SystemExit(f"{wheel.name} is missing the lockknife console script entrypoint")

              if not (extract_dir / "lockknife_headless_cli" / "main.py").exists():
                  raise SystemExit(f"{wheel.name} is missing lockknife_headless_cli/main.py")

              extracted_dirs.append(extract_dir)

          subprocess.run(
              [
                  "uv",
                  "pip",
                  "install",
                  "--system",
                  "click>=8.1",
                  "rich>=13.0",
                  "jinja2>=3.1",
                  "defusedxml>=0.7",
                  "pydantic>=2.0",
                  "pydantic-settings>=2.0",
                  "structlog>=23.0",
              ],
              check=True,
          )

          env = os.environ.copy()
          env["PYTHONPATH"] = str(extracted_dirs[0]) + os.pathsep + env.get("PYTHONPATH", "")
          subprocess.run([sys.executable, "-m", "lockknife", "--version"], check=True, env=env)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -m lockknife-core/Cargo.toml --out dist

      - name: Smoke test built sdist
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil
          import subprocess

          sdist = next(Path("dist").glob("*.tar.gz"))
          subprocess.run(["uv", "pip", "install", "--system", str(sdist)], check=True)

          exe = shutil.which("lockknife")
          if not exe:
              raise SystemExit("lockknife not found on PATH after sdist install")

          subprocess.run([exe, "--version"], check=True)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  upload-release:
    name: Upload to GitHub Release
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List built artifacts
        run: ls -lh dist/

      - name: Upload wheels & sdist to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
